<body>
    <div class="container">
        <a href="index.html" class="back-link">← На главную</a>
        <h1>Выбор цвета</h1>

        <div class="picker-card">
            <div class="visual-section">
                <canvas id="colorWheel" width="280" height="280"></canvas>
                <div class="marker" id="wheelMarker"></div>

                <div class="square-container" id="squareContainer">
                    <canvas id="colorSquare" width="130" height="130"></canvas>
                    <div class="marker" id="squareMarker"></div>
                </div>
            </div>

            <div class="info-section">
                <div class="info-label">Ваш цвет:</div>
                <div class="color-preview" id="colorPreview"></div>

                <div class="values-grid">
                    <div class="value-item">
                        <label>HTML</label>
                        <div class="input-row">
                            <input type="text" id="hexInput" value="#FF0000" readonly>
                            <button class="copy-btn" onclick="copyToClipboard('hexInput')" title="Копировать">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
                                    <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
                                </svg>
                            </button>
                        </div>
                    </div>

                    <div class="value-item">
                        <label>R</label>
                        <div class="input-row">
                            <input type="text" id="rInput" value="255" readonly>
                            <button class="copy-btn" onclick="copyToClipboard('rInput')" title="Копировать">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
                                    <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
                                </svg>
                            </button>
                        </div>
                    </div>

                    <div class="value-item">
                        <label>G</label>
                        <div class="input-row">
                            <input type="text" id="gInput" value="0" readonly>
                            <button class="copy-btn" onclick="copyToClipboard('gInput')" title="Копировать">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
                                    <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
                                </svg>
                            </button>
                        </div>
                    </div>

                    <div class="value-item">
                        <label>B</label>
                        <div class="input-row">
                            <input type="text" id="bInput" value="0" readonly>
                            <button class="copy-btn" onclick="copyToClipboard('bInput')" title="Копировать">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
                                    <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
                                </svg>
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="toast" id="toast">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3">
            <polyline points="20 6 9 17 4 12"></polyline>
        </svg>
        <span>Скопировано!</span>
    </div>

    <script src="color-wheel.js"></script>
</body>
</html>

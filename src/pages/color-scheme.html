<body>
    <div class="container">
        <a href="../../index.html" class="back-link">← На главную</a>
        <h1>Подбор цветов</h1>
        <p class="subtitle">Инструмент для подбора цветов и генерации цветовых схем</p>

        <!-- Выбор гармонии -->
        <div class="harmony-selector">
            <div class="harmony-btn active" data-harmony="analogous">
                <div class="harmony-icon">
                    <svg viewBox="0 0 40 40" width="36" height="36">
                        <circle cx="20" cy="20" r="14" fill="none" stroke="#ccc" stroke-width="1.5"/>
                        <circle cx="20" cy="6" r="3.5" fill="#ff0000"/>
                        <circle cx="32.1" cy="13" r="3.5" fill="#ff8800"/>
                        <circle cx="7.9" cy="13" r="3.5" fill="#ffcc00"/>
                    </svg>
                </div>
                <span>Аналогия</span>
            </div>
            <div class="harmony-btn" data-harmony="monochromatic">
                <div class="harmony-icon">
                    <svg viewBox="0 0 40 40" width="36" height="36">
                        <circle cx="20" cy="20" r="14" fill="none" stroke="#ccc" stroke-width="1.5"/>
                        <circle cx="20" cy="14" r="4" fill="#ff0000" opacity="1"/>
                        <circle cx="20" cy="22" r="4" fill="#ff0000" opacity="0.5"/>
                        <circle cx="20" cy="30" r="4" fill="#ff0000" opacity="0.2"/>
                    </svg>
                </div>
                <span>Монохром</span>
            </div>
            <div class="harmony-btn" data-harmony="complementary">
                <div class="harmony-icon">
                    <svg viewBox="0 0 40 40" width="36" height="36">
                        <circle cx="20" cy="20" r="14" fill="none" stroke="#ccc" stroke-width="1.5"/>
                        <circle cx="20" cy="6" r="3.5" fill="#ff0000"/>
                        <circle cx="20" cy="34" r="3.5" fill="#00ff00"/>
                    </svg>
                </div>
                <span>Контраст</span>
            </div>
            <div class="harmony-btn" data-harmony="triadic">
                <div class="harmony-icon">
                    <svg viewBox="0 0 40 40" width="36" height="36">
                        <circle cx="20" cy="20" r="14" fill="none" stroke="#ccc" stroke-width="1.5"/>
                        <circle cx="20" cy="6" r="3.5" fill="#ff0000"/>
                        <circle cx="32.1" cy="27" r="3.5" fill="#00ff00"/>
                        <circle cx="7.9" cy="27" r="3.5" fill="#0000ff"/>
                    </svg>
                </div>
                <span>Триада</span>
            </div>
            <div class="harmony-btn" data-harmony="tetradic">
                <div class="harmony-icon">
                    <svg viewBox="0 0 40 40" width="36" height="36">
                        <circle cx="20" cy="20" r="14" fill="none" stroke="#ccc" stroke-width="1.5"/>
                        <circle cx="10" cy="10" r="3" fill="#ff0000"/>
                        <circle cx="30" cy="10" r="3" fill="#00ff00"/>
                        <circle cx="30" cy="30" r="3" fill="#0000ff"/>
                        <circle cx="10" cy="30" r="3" fill="#ffff00"/>
                    </svg>
                </div>
                <span>Тетрада</span>
            </div>
            <div class="harmony-btn" data-harmony="accent">
                <div class="harmony-icon">
                    <svg viewBox="0 0 40 40" width="36" height="36">
                        <circle cx="20" cy="20" r="14" fill="none" stroke="#ccc" stroke-width="1.5"/>
                        <circle cx="20" cy="6" r="3" fill="#999"/>
                        <circle cx="32.1" cy="27" r="3" fill="#ff0000"/>
                        <circle cx="7.9" cy="27" r="3" fill="#0000ff"/>
                    </svg>
                </div>
                <span>Акцент</span>
            </div>
        </div>

        <!-- Настройки -->
        <div class="settings-row">
            <div class="setting-group">
                <label>Оттенок: <span id="hueValue">0°</span></label>
                <div class="setting-controls">
                    <button class="setting-btn" id="hueMinus">−</button>
                    <button class="setting-btn" id="huePlus">+</button>
                </div>
            </div>
            <div class="setting-group">
                <label>Угол: <span id="angleValue">30°</span></label>
                <div class="setting-controls">
                    <button class="setting-btn" id="angleMinus">−</button>
                    <button class="setting-btn" id="anglePlus">+</button>
                </div>
            </div>
        </div>

        <!-- Основной контент -->
        <div class="main-content">
            <!-- Левая колонка: Колесо -->
            <div class="color-wheel-section">
                <div class="color-wheel-container">
                    <canvas id="colorWheel" width="300" height="300"></canvas>
                    <div class="wheel-markers" id="wheelMarkers"></div>
                </div>
                <div class="current-color-info">
                    <div class="color-preview-large" id="mainColorPreview"></div>
                    <div class="color-details">
                        <div class="detail-row">
                            <span>R: <span id="rPercent">100</span>%</span>
                            <span>G: <span id="gPercent">0</span>%</span>
                            <span>B: <span id="bPercent">0</span>%</span>
                        </div>
                        <div class="hex-display">
                            RGB: <span id="hexDisplay">FF0000</span>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Правая колонка: Палитра -->
            <div class="palette-section">
                <div class="palette-url">
                    Постоянный адрес текущей цветовой схемы:<br>
                    <a href="#" id="schemeUrl">https://colors.sophron.ru/</a>
                </div>

                <div class="palette-display" id="paletteDisplay"></div>
                <div class="tints-display" id="tintsDisplay"></div>

                <div class="palette-actions">
                    <button class="action-btn" onclick="showSchemeView()">Просмотр схемы</button>
                    <button class="action-btn" onclick="showLightExample()">Пример светлой страницы</button>
                    <button class="action-btn" onclick="showDarkExample()">Пример тёмной страницы</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Уведомление -->
    <div class="toast" id="toast">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3">
            <polyline points="20 6 9 17 4 12"></polyline>
        </svg>
        <span>Скопировано!</span>
    </div>

    <script src="../scripts/color-scheme.js"></script>
</body>
</html>

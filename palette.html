<body>
    <div class="palette-container">
        <a href="index.html" class="back-link">← На главную</a>
        <h1>Палитра</h1>

        <div class="color-picker-wrapper">
            <!-- Левый квадрат: Текущий выбранный цвет -->
            <div class="color-preview" id="colorPreview"></div>

            <!-- Правый прямоугольник: Градиент HSV -->
            <div class="color-gradient-picker" id="colorGradient">
                <div class="color-selector" id="colorSelector"></div>
            </div>
        </div>

        <!-- Полоска спектра -->
        <div class="hue-slider" id="hueSlider">
            <div class="hue-selector" id="hueSelector"></div>
        </div>

        <!-- Значения цветов -->
        <div class="color-values">
            <div class="color-value-box">
                <div class="color-value-info">
                    <div class="color-label">HEX</div>
                    <div class="color-code" id="hexValue">#CAB7E1</div>
                </div>
                <button class="copy-btn" data-type="hex">
                    <svg class="copy-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
                        <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
                    </svg>
                    <span class="copy-text">Копировать</span>
                </button>
            </div>

            <div class="color-value-box">
                <div class="color-value-info">
                    <div class="color-label">RGB</div>
                    <div class="color-code" id="rgbValue">202, 183, 225</div>
                </div>
                <button class="copy-btn" data-type="rgb">
                    <svg class="copy-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
                        <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
                    </svg>
                    <span class="copy-text">Копировать</span>
                </button>
            </div>

            <div class="color-value-box">
                <div class="color-value-info">
                    <div class="color-label">HSL</div>
                    <div class="color-code" id="hslValue">267°, 42%, 80%</div>
                </div>
                <button class="copy-btn" data-type="hsl">
                    <svg class="copy-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
                        <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
                    </svg>
                    <span class="copy-text">Копировать</span>
                </button>
            </div>

            <div class="color-value-box">
                <div class="color-value-info">
                    <div class="color-label">HSV</div>
                    <div class="color-code" id="hsvValue">267°, 19%, 88%</div>
                </div>
                <button class="copy-btn" data-type="hsv">
                    <svg class="copy-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
                        <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
                    </svg>
                    <span class="copy-text">Копировать</span>
                </button>
            </div>
        </div>
    </div>

    <div class="toast" id="toast">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3">
            <polyline points="20 6 9 17 4 12"></polyline>
        </svg>
        <span>Скопировано!</span>
    </div>

    <script src="palette.js"></script>
</body>
</html>
